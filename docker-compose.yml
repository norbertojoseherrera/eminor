services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eminor
      POSTGRES_PASSWORD: eminor_dev
      POSTGRES_DB: eminor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eminor"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eminor
      POSTGRES_PASSWORD: eminor_dev
      POSTGRES_DB: eminor_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data:
